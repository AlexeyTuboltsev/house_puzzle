name: Build Tauri App

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  MACOSX_DEPLOYMENT_TARGET: "10.15"

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
            artifact-suffix: linux
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            artifact-suffix: macos-aarch64
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            artifact-suffix: macos-x86_64
          - platform: windows-latest
            args: ''
            artifact-suffix: windows

    permissions:
      contents: write
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2

      - name: Cache Elm packages
        uses: actions/cache@v4
        with:
          path: ~/.elm
          key: ${{ runner.os }}-elm-${{ hashFiles('elm/elm.json') }}
          restore-keys: |
            ${{ runner.os }}-elm-

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libclang-dev libfontconfig1-dev libfreetype6-dev \
            pkg-config patchelf

      - name: Install LLVM (Windows)
        if: matrix.platform == 'windows-latest'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Set macOS deployment target flags
        if: matrix.platform == 'macos-latest'
        run: |
          echo "CFLAGS=-mmacosx-version-min=10.15" >> $GITHUB_ENV
          echo "CXXFLAGS=-mmacosx-version-min=10.15" >> $GITHUB_ENV

      - name: Set app version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting app version to $VERSION"
          cd crates/hp-tauri
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" tauri.conf.json
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          sed -i.bak "s/version: 'dev'/version: '$VERSION'/" dist/index.html
          rm -f tauri.conf.json.bak Cargo.toml.bak dist/index.html.bak

      # Bundle + sign + (on tag pushes) create the GitHub release with
      # the install bundles, .sig files, the updater archives, and
      # latest.json. The Tauri updater plugin in the running app polls
      # latest.json and verifies the downloaded bundle's signature
      # against the public key in tauri.conf.json before replacing the
      # binary.
      #
      # The signing pipeline only engages when `bundle.createUpdaterArtifacts`
      # is true in tauri.conf.json. Without that, tauri silently skips
      # generating .sig files and tauri-action's `includeUpdaterJson`
      # bails with "Signature not found for the updater JSON" — see
      # https://github.com/tauri-apps/tauri-action/issues/1098 .
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: crates/hp-tauri
          args: ${{ matrix.args }}
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && format('House Puzzle {0}', github.ref_name) || '' }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

      # Always-on artifact upload of every install bundle, updater
      # archive, and .sig file. Used by workflow_dispatch runs (no
      # release) so we can grab a build locally; on tag pushes the
      # same files are uploaded to the GitHub release by tauri-action.
      - uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.artifact-suffix }}
          path: |
            target/**/bundle/**/*.deb
            target/**/bundle/**/*.AppImage
            target/**/bundle/**/*.AppImage.sig
            target/**/bundle/**/*.AppImage.tar.gz
            target/**/bundle/**/*.AppImage.tar.gz.sig
            target/**/bundle/**/*.dmg
            target/**/bundle/**/*.app.tar.gz
            target/**/bundle/**/*.app.tar.gz.sig
            target/**/bundle/**/*.msi
            target/**/bundle/**/*.msi.sig
            target/**/bundle/**/*.msi.zip
            target/**/bundle/**/*.msi.zip.sig
            target/**/bundle/**/*.exe
            target/**/bundle/**/*.exe.sig
            target/**/bundle/**/*.nsis.zip
            target/**/bundle/**/*.nsis.zip.sig
          if-no-files-found: warn
