name: Build Tauri App

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  MACOSX_DEPLOYMENT_TARGET: "10.15"

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
            artifact-suffix: linux
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            artifact-suffix: macos-aarch64
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            artifact-suffix: macos-x86_64
          - platform: windows-latest
            args: ''
            artifact-suffix: windows

    permissions:
      contents: write
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2

      - name: Cache Elm packages
        uses: actions/cache@v4
        with:
          path: ~/.elm
          key: ${{ runner.os }}-elm-${{ hashFiles('elm/elm.json') }}
          restore-keys: |
            ${{ runner.os }}-elm-

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libclang-dev libfontconfig1-dev libfreetype6-dev \
            pkg-config patchelf

      - name: Install LLVM (Windows)
        if: matrix.platform == 'windows-latest'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Set macOS deployment target flags
        if: matrix.platform == 'macos-latest'
        run: |
          echo "CFLAGS=-mmacosx-version-min=10.15" >> $GITHUB_ENV
          echo "CXXFLAGS=-mmacosx-version-min=10.15" >> $GITHUB_ENV

      - name: Set app version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting app version to $VERSION"
          cd crates/hp-tauri
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" tauri.conf.json
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          sed -i.bak "s/version: 'dev'/version: '$VERSION'/" dist/index.html
          rm -f tauri.conf.json.bak Cargo.toml.bak dist/index.html.bak

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: crates/hp-tauri
          args: ${{ matrix.args }}

      - name: Collect and rename release artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          mkdir -p release-artifacts/${{ matrix.artifact-suffix }}
          SUFFIX=${{ matrix.artifact-suffix }}

          # Find and copy artifacts with platform prefix
          find target -name "*.deb" -path "*/bundle/*" | while read f; do
            base=$(basename "$f")
            cp "$f" "release-artifacts/${SUFFIX}/${SUFFIX}-${base}"
          done
          find target -name "*.AppImage" -path "*/bundle/*" | while read f; do
            base=$(basename "$f")
            cp "$f" "release-artifacts/${SUFFIX}/${SUFFIX}-${base}"
            chmod +x "release-artifacts/${SUFFIX}/${SUFFIX}-${base}"
          done
          find target -name "*.dmg" -path "*/bundle/*" | while read f; do
            base=$(basename "$f")
            cp "$f" "release-artifacts/${SUFFIX}/${SUFFIX}-${base}"
          done
          find target -name "*.msi" -path "*/bundle/*" | while read f; do
            base=$(basename "$f")
            cp "$f" "release-artifacts/${SUFFIX}/${SUFFIX}-${base}"
          done
          find target -name "*.exe" -path "*/bundle/nsis/*" | while read f; do
            base=$(basename "$f")
            cp "$f" "release-artifacts/${SUFFIX}/${SUFFIX}-${base}"
          done

          echo "Release artifacts for ${SUFFIX}:"
          ls -la release-artifacts/${SUFFIX}/ || echo "(none)"

      - name: Upload release artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/${{ matrix.artifact-suffix }}/*

      - uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.artifact-suffix }}
          path: release-artifacts/${{ matrix.artifact-suffix }}/
          if-no-files-found: warn
