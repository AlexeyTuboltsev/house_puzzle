name: Build Tauri App

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
    paths:
      - 'crates/hp-tauri/**'
      - 'crates/hp-core/**'
      - 'elm/**'
      - 'Cargo.toml'
      - 'Cargo.lock'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
            artifact-suffix: linux
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            artifact-suffix: macos-aarch64
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            artifact-suffix: macos-x86_64
          - platform: windows-latest
            args: ''
            artifact-suffix: windows

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libclang-dev libfontconfig1-dev libfreetype6-dev pkg-config patchelf

      - name: Install LLVM (Windows)
        if: matrix.platform == 'windows-latest'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: crates/hp-tauri
          args: ${{ matrix.args }}

      - uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.artifact-suffix }}
          path: |
            target/release/bundle/**/*.deb
            target/release/bundle/**/*.AppImage
            target/release/bundle/**/*.dmg
            target/release/bundle/**/*.app
            target/release/bundle/**/*.msi
            target/release/bundle/**/*.exe
            target/aarch64-apple-darwin/release/bundle/**/*.dmg
            target/aarch64-apple-darwin/release/bundle/**/*.app
            target/x86_64-apple-darwin/release/bundle/**/*.dmg
            target/x86_64-apple-darwin/release/bundle/**/*.app
