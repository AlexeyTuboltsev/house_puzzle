name: Build Rust Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'

env:
  CARGO_TERM_COLOR: always
  TEST_FIXTURE_TAG: test-fixtures-v1

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      version_dash: ${{ steps.ver.outputs.version_dash }}
    steps:
      - name: Extract version
        id: ver
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VER="${GITHUB_REF_NAME#v}"
          else
            VER="dev"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "version_dash=${VER//./-}" >> "$GITHUB_OUTPUT"

  build-linux:
    needs: version
    runs-on: ubuntu-22.04
    env:
      HP_VERSION: ${{ needs.version.outputs.version }}
      HP_VERSION_DASH: ${{ needs.version.outputs.version_dash }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libclang-dev libfontconfig1-dev libfreetype6-dev pkg-config
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ubuntu-22.04
      - name: Build release
        run: cargo build --release --bin hp-server
      - name: Package
        run: |
          mkdir -p house-puzzle-${HP_VERSION}-linux-x86_64
          cp target/release/hp-server house-puzzle-${HP_VERSION}-linux-x86_64/house-puzzle-${HP_VERSION_DASH}
          cp -r presets house-puzzle-${HP_VERSION}-linux-x86_64/ 2>/dev/null || true
          tar -czf house-puzzle-${HP_VERSION}-linux-x86_64.tar.gz house-puzzle-${HP_VERSION}-linux-x86_64/
      - uses: actions/upload-artifact@v4
        with:
          name: archive-linux
          path: house-puzzle-${{ env.HP_VERSION }}-linux-x86_64.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: binary-linux
          path: target/release/hp-server

  build-macos-arm:
    needs: version
    runs-on: macos-latest
    env:
      HP_VERSION: ${{ needs.version.outputs.version }}
      HP_VERSION_DASH: ${{ needs.version.outputs.version_dash }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --release --bin hp-server
      - name: Package
        run: |
          mkdir -p house-puzzle-${HP_VERSION}-macos-arm64
          cp target/release/hp-server house-puzzle-${HP_VERSION}-macos-arm64/house-puzzle-${HP_VERSION_DASH}
          cp -r presets house-puzzle-${HP_VERSION}-macos-arm64/ 2>/dev/null || true
          tar -czf house-puzzle-${HP_VERSION}-macos-arm64.tar.gz house-puzzle-${HP_VERSION}-macos-arm64/
      - uses: actions/upload-artifact@v4
        with:
          name: archive-macos-arm
          path: house-puzzle-${{ env.HP_VERSION }}-macos-arm64.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: binary-macos-arm
          path: target/release/hp-server

  build-macos-intel:
    needs: version
    runs-on: macos-15-intel
    env:
      HP_VERSION: ${{ needs.version.outputs.version }}
      HP_VERSION_DASH: ${{ needs.version.outputs.version_dash }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --release --bin hp-server --target x86_64-apple-darwin
      - name: Package
        run: |
          mkdir -p house-puzzle-${HP_VERSION}-macos-x86_64
          cp target/x86_64-apple-darwin/release/hp-server house-puzzle-${HP_VERSION}-macos-x86_64/house-puzzle-${HP_VERSION_DASH}
          cp -r presets house-puzzle-${HP_VERSION}-macos-x86_64/ 2>/dev/null || true
          tar -czf house-puzzle-${HP_VERSION}-macos-x86_64.tar.gz house-puzzle-${HP_VERSION}-macos-x86_64/
      - uses: actions/upload-artifact@v4
        with:
          name: archive-macos-intel
          path: house-puzzle-${{ env.HP_VERSION }}-macos-x86_64.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: binary-macos-intel
          path: target/x86_64-apple-darwin/release/hp-server

  build-windows:
    needs: version
    runs-on: windows-latest
    env:
      HP_VERSION: ${{ needs.version.outputs.version }}
      HP_VERSION_DASH: ${{ needs.version.outputs.version_dash }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install LLVM (for libclang)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"
      - name: Build release
        run: cargo build --release --bin hp-server
      - name: Package
        run: |
          $dir = "house-puzzle-${env:HP_VERSION}-windows-x86_64"
          New-Item -ItemType Directory -Path $dir
          Copy-Item target\release\hp-server.exe "$dir\house-puzzle-${env:HP_VERSION_DASH}.exe"
          if (Test-Path presets) { Copy-Item -Recurse presets "$dir\presets" }
          Compress-Archive -Path "$dir" -DestinationPath "house-puzzle-${env:HP_VERSION}-windows-x86_64.zip"
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: archive-windows
          path: house-puzzle-${{ env.HP_VERSION }}-windows-x86_64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: binary-windows
          path: target/release/hp-server.exe

  # ---------------------------------------------------------------------------
  # Canary e2e tests
  # ---------------------------------------------------------------------------

  canary-linux:
    needs: build-linux
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: binary-linux
          path: bin
      - name: Download test fixture
        run: gh release download ${{ env.TEST_FIXTURE_TAG }} -p "_NY2.ai" -D in/
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Run canary
        run: |
          chmod +x bin/hp-server
          python3 tests/canary.py --binary bin/hp-server --fixture in/_NY2.ai --platform linux-x86_64
      - name: Upload baselines
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canary-baseline-linux-x86_64
          path: tests/baselines/canary/linux-x86_64.json
          if-no-files-found: ignore

  canary-macos-arm:
    needs: build-macos-arm
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: binary-macos-arm
          path: bin
      - name: Download test fixture
        run: gh release download ${{ env.TEST_FIXTURE_TAG }} -p "_NY2.ai" -D in/
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Run canary
        run: |
          chmod +x bin/hp-server
          python3 tests/canary.py --binary bin/hp-server --fixture in/_NY2.ai --platform macos-arm64
      - name: Upload baselines
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canary-baseline-macos-arm64
          path: tests/baselines/canary/macos-arm64.json
          if-no-files-found: ignore

  canary-macos-intel:
    needs: build-macos-intel
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: binary-macos-intel
          path: bin
      - name: Download test fixture
        run: gh release download ${{ env.TEST_FIXTURE_TAG }} -p "_NY2.ai" -D in/
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Run canary
        run: |
          chmod +x bin/hp-server
          python3 tests/canary.py --binary bin/hp-server --fixture in/_NY2.ai --platform macos-x86_64
      - name: Upload baselines
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canary-baseline-macos-x86_64
          path: tests/baselines/canary/macos-x86_64.json
          if-no-files-found: ignore

  canary-windows:
    needs: build-windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: binary-windows
          path: bin
      - name: Download test fixture
        run: gh release download ${{ env.TEST_FIXTURE_TAG }} -p "_NY2.ai" -D in/
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Run canary
        run: python tests/canary.py --binary bin/hp-server.exe --fixture in/_NY2.ai --platform windows-x86_64
      - name: Upload baselines
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canary-baseline-windows-x86_64
          path: tests/baselines/canary/windows-x86_64.json
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Release — attach platform-built archives to GitHub release
  # ---------------------------------------------------------------------------

  release:
    needs: [version, canary-linux, canary-macos-arm, canary-macos-intel, canary-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: archives
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            archives/archive-linux/*
            archives/archive-macos-arm/*
            archives/archive-macos-intel/*
            archives/archive-windows/*
