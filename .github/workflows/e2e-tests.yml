name: E2E Tests

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'tools/ai-validate/**'
      - '.github/workflows/release-ai-validate.yml'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'tools/ai-validate/**'
      - '.github/workflows/release-ai-validate.yml'

env:
  CARGO_TERM_COLOR: always
  MACOSX_DEPLOYMENT_TARGET: "10.15"

jobs:
  e2e:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            artifact-suffix: linux
            app_binary: target/debug/hp-tauri
            test_binary: target/debug/hp-e2e-test
            cargo_build_args:
          - platform: macos-latest
            artifact-suffix: macos-aarch64
            app_binary: target/debug/hp-tauri
            test_binary: target/debug/hp-e2e-test
            cargo_build_args:
          - platform: macos-latest
            artifact-suffix: macos-x86_64
            app_binary: target/debug/hp-tauri
            test_binary: target/debug/hp-e2e-test
            cargo_build_args:
          - platform: windows-latest
            artifact-suffix: windows
            app_binary: target/release/hp-tauri.exe
            test_binary: target/release/hp-e2e-test.exe
            cargo_build_args: --release

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Cache Elm packages
        uses: actions/cache@v4
        with:
          path: ~/.elm
          key: ${{ runner.os }}-elm-${{ hashFiles('elm/elm.json') }}
          restore-keys: |
            ${{ runner.os }}-elm-

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libclang-dev libfontconfig1-dev libfreetype6-dev \
            pkg-config patchelf xvfb scrot \
            python3-gi gir1.2-atspi-2.0 at-spi2-core

      - name: Install LLVM (Windows)
        if: matrix.platform == 'windows-latest'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Set macOS deployment target flags
        if: matrix.platform == 'macos-latest'
        run: |
          echo "CFLAGS=-mmacosx-version-min=10.15" >> $GITHUB_ENV
          echo "CXXFLAGS=-mmacosx-version-min=10.15" >> $GITHUB_ENV

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Elm frontend
        working-directory: elm
        run: |
          npm install -g elm
          elm make src/Main.elm --output ../crates/hp-tauri/dist/elm.js

      - name: Configure SSH for private git deps
        shell: bash
        run: |
          mkdir -p "$HOME/.ssh"
          echo "${{ secrets.DEPLOY_KEY_TAURI_UI_TEST }}" > "$HOME/.ssh/tauri_ui_test"
          chmod 600 "$HOME/.ssh/tauri_ui_test"
          ssh-keyscan github.com >> "$HOME/.ssh/known_hosts" 2>/dev/null
          echo "GIT_SSH_COMMAND=ssh -i $HOME/.ssh/tauri_ui_test -o StrictHostKeyChecking=no" >> $GITHUB_ENV
          echo "CARGO_NET_GIT_FETCH_WITH_CLI=true" >> $GITHUB_ENV

      - name: Build app + test runner
        run: |
          cargo build ${{ matrix.cargo_build_args }} --manifest-path crates/hp-tauri/Cargo.toml
          cargo build ${{ matrix.cargo_build_args }} --manifest-path tests/accessibility/Cargo.toml --target-dir target

      - name: Download test fixture
        run: gh release download test-fixtures-v1 -p "_NY2.ai" -D in/
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run E2E tests (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          chmod +x ${{ matrix.app_binary }} ${{ matrix.test_binary }}
          xvfb-run --auto-servernum --server-args="-screen 0 1280x800x24" \
            ${{ matrix.test_binary }} \
              --binary ${{ matrix.app_binary }} \
              --fixture-dir in \
              --screenshots screenshots \
              --baselines tests/accessibility/baselines/${{ matrix.artifact-suffix }}

      - name: Run E2E tests (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          chmod +x ${{ matrix.app_binary }} ${{ matrix.test_binary }}
          ${{ matrix.test_binary }} \
            --binary ${{ matrix.app_binary }} \
            --fixture-dir in \
            --screenshots screenshots \
            --baselines tests/accessibility/baselines/${{ matrix.artifact-suffix }}

      # Windows: the screen-level capture includes the OS taskbar
      # (Start menu, system tray, ticking clock). We mask the bottom
      # 48 px of the comparison so the clock can't flake the run;
      # everything above that — title bar, app content — is stable.
      - name: Run E2E tests (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          ${{ matrix.test_binary }} `
            --binary ${{ matrix.app_binary }} `
            --fixture-dir in `
            --screenshots screenshots `
            --baselines tests/accessibility/baselines/${{ matrix.artifact-suffix }} `
            --mask-bottom 48

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots-${{ matrix.artifact-suffix }}
          path: screenshots/
          if-no-files-found: warn

  # Deploy screenshots to GitHub Pages + post PR comment with link
  publish-screenshots:
    needs: e2e
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      pages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: screenshots
          pattern: e2e-screenshots-*
          merge-multiple: false

      - name: Build screenshots page
        run: |
          RUN=${{ github.run_id }}
          REPO=${{ github.repository }}
          DATE=$(date -u +%Y-%m-%d\ %H:%M)
          SHA=${{ github.sha }}
          SHORT_SHA=${SHA:0:7}
          BRANCH=${{ github.head_ref || github.ref_name }}
          PLATFORMS="linux macos-aarch64 macos-x86_64 windows"
          STEPS="initial-state house-loaded puzzle-generated"

          mkdir -p site/runs/${RUN}

          # Copy screenshots
          for platform_dir in screenshots/e2e-screenshots-*/; do
            [ -d "$platform_dir" ] || continue
            platform=$(basename "$platform_dir" | sed 's/e2e-screenshots-//')
            mkdir -p "site/runs/${RUN}/${platform}"
            cp "$platform_dir"*.png "site/runs/${RUN}/${platform}/" 2>/dev/null || true
          done

          # Generate run page
          cat > "site/runs/${RUN}/index.html" <<RUNHTML
          <!DOCTYPE html>
          <html><head>
          <meta charset="utf-8">
          <title>E2E Run #${RUN}</title>
          <style>
            body { font-family: -apple-system, sans-serif; max-width: 1400px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
            h1 { color: #2060b0; }
            .meta { color: #666; font-size: 14px; margin-bottom: 20px; }
            .meta a { color: #2060b0; }
            .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
            .platform { text-align: center; }
            .platform h3 { margin: 0 0 8px; color: #333; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
            .step { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 8px; margin-bottom: 12px; cursor: zoom-in; transition: border-color 0.1s; }
            .step:hover { border-color: #2060b0; }
            .step .step-label { font-size: 12px; font-weight: 600; color: #333; margin-bottom: 6px; }
            .trio { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; }
            .trio a { display: block; line-height: 0; }
            .trio img { width: 100%; border-radius: 3px; cursor: zoom-in; border: 1px solid #eee; }
            .trio a:hover img { outline: 2px solid #2060b0; }
            .trio-labels { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; margin-top: 4px; font-size: 10px; color: #888; }
            .trio-labels span:nth-child(1) { color: #2a7a2a; }
            .trio-labels span:nth-child(2) { color: #2060b0; }
            .trio-labels span:nth-child(3) { color: #c02060; }
            .missing { height: 60px; background: #f0f0f0; border: 1px dashed #ccc; border-radius: 3px; display: flex; align-items: center; justify-content: center; color: #ccc; font-size: 10px; }
            .back { margin-bottom: 16px; }
            .back a { color: #2060b0; text-decoration: none; }
            @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }

            /* Lightbox overlay — shared by single + trio modes */
            .lb { position: fixed; inset: 0; background: rgba(20, 20, 20, 0.95); display: none; flex-direction: column; z-index: 100; user-select: none; }
            .lb.open { display: flex; }
            .lb-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; color: #ddd; font-size: 13px; border-bottom: 1px solid #333; }
            .lb-header .lb-title { font-weight: 600; }
            .lb-header .lb-hint { color: #888; font-size: 11px; }
            .lb-close { cursor: pointer; color: #ccc; font-size: 22px; line-height: 1; padding: 0 8px; }
            .lb-close:hover { color: #fff; }
            .lb-body { flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; padding: 16px; position: relative; }
            /* Single mode */
            .lb-single { display: flex; flex-direction: column; align-items: center; gap: 8px; max-width: 100%; max-height: 100%; }
            .lb-single img { max-width: 100%; max-height: calc(100vh - 140px); object-fit: contain; background: #222; box-shadow: 0 4px 24px rgba(0,0,0,0.5); }
            .lb-single .lb-variant { font-size: 13px; padding: 4px 12px; border-radius: 12px; background: #333; }
            .lb-single .lb-variant.expected { color: #5fbf5f; }
            .lb-single .lb-variant.received { color: #6fa9ff; }
            .lb-single .lb-variant.diff { color: #ff66b0; }
            .lb-nav { position: absolute; top: 50%; transform: translateY(-50%); width: 44px; height: 64px; display: flex; align-items: center; justify-content: center; color: #aaa; font-size: 32px; cursor: pointer; background: rgba(0,0,0,0.4); border-radius: 4px; }
            .lb-nav:hover { color: #fff; background: rgba(0,0,0,0.7); }
            .lb-prev { left: 16px; }
            .lb-next { right: 16px; }
            /* Trio mode */
            .lb-trio { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; max-width: 100%; max-height: 100%; align-items: center; }
            .lb-trio-cell { display: flex; flex-direction: column; align-items: center; gap: 6px; min-width: 0; }
            .lb-trio-cell img { max-width: 100%; max-height: calc(100vh - 160px); object-fit: contain; background: #222; box-shadow: 0 4px 24px rgba(0,0,0,0.5); cursor: zoom-in; }
            .lb-trio-cell .lb-variant { font-size: 12px; padding: 3px 10px; border-radius: 10px; background: #333; }
            .lb-trio-cell .lb-variant.expected { color: #5fbf5f; }
            .lb-trio-cell .lb-variant.received { color: #6fa9ff; }
            .lb-trio-cell .lb-variant.diff { color: #ff66b0; }
          </style>
          </head><body>
          <div class="back"><a href="../../">&larr; All runs</a></div>
          <h1>E2E Screenshots</h1>
          <div class="meta">
            Run <a href="https://github.com/${REPO}/actions/runs/${RUN}">#${RUN}</a>
            &middot; ${DATE} UTC
            &middot; <code>${SHORT_SHA}</code>
            &middot; ${BRANCH}
          </div>
          <div class="grid">
          RUNHTML

          # Per platform column, per step a trio: expected | received | diff
          for platform in $PLATFORMS; do
            echo "<div class='platform'><h3>${platform}</h3>" >> "site/runs/${RUN}/index.html"
            for step in $STEPS; do
              expected="${platform}/${step}.expected.png"
              received="${platform}/${step}.png"
              diff="${platform}/${step}.diff.png"
              echo "<div class='step'><div class='step-label'>${step}</div><div class='trio'>" >> "site/runs/${RUN}/index.html"
              for variant in "$expected" "$received" "$diff"; do
                if [ -f "site/runs/${RUN}/${variant}" ]; then
                  echo "<a href='${variant}' target='_blank'><img src='${variant}'></a>" >> "site/runs/${RUN}/index.html"
                else
                  echo "<div class='missing'>missing</div>" >> "site/runs/${RUN}/index.html"
                fi
              done
              echo "</div><div class='trio-labels'><span>Expected</span><span>Received</span><span>Diff</span></div></div>" >> "site/runs/${RUN}/index.html"
            done
            echo "</div>" >> "site/runs/${RUN}/index.html"
          done

          # Close .grid, then add the lightbox overlay + JS
          cat >> "site/runs/${RUN}/index.html" <<'LBHTML'
          </div>
          <div class="lb" id="lb">
            <div class="lb-header">
              <span class="lb-title" id="lb-title"></span>
              <span class="lb-hint">← / → navigate · Esc to close</span>
              <span class="lb-close" id="lb-close" title="Close (Esc)">✕</span>
            </div>
            <div class="lb-body" id="lb-body"></div>
          </div>
          <script>
          (function () {
            const VARIANT_NAMES = ['Expected', 'Received', 'Diff'];
            const VARIANT_CLASSES = ['expected', 'received', 'diff'];

            // Build a flat list of all real (non-missing) image slots and a parallel
            // step list. Each step keeps the 3 slot indices it owns (or -1 for missing).
            const slots = [];     // {src, platform, step, variantIdx}
            const stepsArr = [];  // {platform, step, slotIdx[3]}
            document.querySelectorAll('.step').forEach((stepEl, i) => {
              const platform = stepEl.closest('.platform').querySelector('h3').textContent;
              const stepName = stepEl.querySelector('.step-label').textContent;
              const cells = stepEl.querySelector('.trio').children;
              const slotIdx = [-1, -1, -1];
              for (let v = 0; v < 3 && v < cells.length; v++) {
                const cell = cells[v];
                if (cell.tagName === 'A') {
                  slotIdx[v] = slots.length;
                  slots.push({ src: cell.getAttribute('href'), platform, step: stepName, variantIdx: v });
                }
              }
              stepEl.dataset.stepIndex = i;
              stepsArr.push({ platform, step: stepName, slotIdx });
            });

            const lb = document.getElementById('lb');
            const lbTitle = document.getElementById('lb-title');
            const lbBody = document.getElementById('lb-body');
            const lbClose = document.getElementById('lb-close');

            let mode = null;       // 'single' | 'trio' | null
            let cursor = 0;        // slot index for single mode
            let stepCursor = 0;    // step index for trio mode

            function openSingle(slotIdx) {
              if (slotIdx < 0 || slotIdx >= slots.length) return;
              mode = 'single';
              cursor = slotIdx;
              renderSingle();
              lb.classList.add('open');
            }

            function openTrio(stepIdx) {
              if (stepIdx < 0 || stepIdx >= stepsArr.length) return;
              mode = 'trio';
              stepCursor = stepIdx;
              renderTrio();
              lb.classList.add('open');
            }

            function close() {
              lb.classList.remove('open');
              mode = null;
              lbBody.innerHTML = '';
            }

            function renderSingle() {
              const s = slots[cursor];
              lbTitle.textContent = s.platform + ' · ' + s.step;
              lbBody.innerHTML =
                '<div class="lb-nav lb-prev" id="lb-prev">‹</div>' +
                '<div class="lb-single">' +
                  '<img src="' + s.src + '">' +
                  '<span class="lb-variant ' + VARIANT_CLASSES[s.variantIdx] + '">' + VARIANT_NAMES[s.variantIdx] + '</span>' +
                '</div>' +
                '<div class="lb-nav lb-next" id="lb-next">›</div>';
              document.getElementById('lb-prev').onclick = () => step(-1);
              document.getElementById('lb-next').onclick = () => step(1);
            }

            function renderTrio() {
              const st = stepsArr[stepCursor];
              lbTitle.textContent = st.platform + ' · ' + st.step;
              const cells = st.slotIdx.map((slotIdx, v) => {
                const variant = VARIANT_NAMES[v];
                const klass = VARIANT_CLASSES[v];
                if (slotIdx < 0) {
                  return '<div class="lb-trio-cell"><div class="missing" style="width:100%;height:200px">missing</div><span class="lb-variant ' + klass + '">' + variant + '</span></div>';
                }
                return '<div class="lb-trio-cell" data-slot="' + slotIdx + '">' +
                  '<img src="' + slots[slotIdx].src + '">' +
                  '<span class="lb-variant ' + klass + '">' + variant + '</span>' +
                '</div>';
              }).join('');
              lbBody.innerHTML = '<div class="lb-trio">' + cells + '</div>';
              // Click a cell to drop into single mode at that variant
              lbBody.querySelectorAll('.lb-trio-cell[data-slot]').forEach(el => {
                el.onclick = () => openSingle(parseInt(el.dataset.slot, 10));
              });
            }

            function step(delta) {
              if (mode === 'single') {
                cursor = (cursor + delta + slots.length) % slots.length;
                renderSingle();
              } else if (mode === 'trio') {
                stepCursor = (stepCursor + delta + stepsArr.length) % stepsArr.length;
                renderTrio();
              }
            }

            // Wire clicks on the gallery
            document.querySelectorAll('.step').forEach(stepEl => {
              stepEl.addEventListener('click', e => {
                // Let an explicit thumbnail click take precedence
                const a = e.target.closest('.trio a');
                if (a) {
                  e.preventDefault();
                  e.stopPropagation();
                  // Find which slot this anchor maps to
                  const stepIdx = parseInt(stepEl.dataset.stepIndex, 10);
                  const cellIdx = Array.prototype.indexOf.call(stepEl.querySelector('.trio').children, a);
                  const slotIdx = stepsArr[stepIdx].slotIdx[cellIdx];
                  if (slotIdx >= 0) openSingle(slotIdx);
                  return;
                }
                e.preventDefault();
                openTrio(parseInt(stepEl.dataset.stepIndex, 10));
              });
            });

            // Lightbox controls
            lbClose.addEventListener('click', close);
            lb.addEventListener('click', e => { if (e.target === lb || e.target === lbBody) close(); });
            document.addEventListener('keydown', e => {
              if (!lb.classList.contains('open')) return;
              if (e.key === 'Escape') { close(); e.preventDefault(); }
              else if (e.key === 'ArrowRight') { step(1); e.preventDefault(); }
              else if (e.key === 'ArrowLeft') { step(-1); e.preventDefault(); }
            });
          })();
          </script>
          </body></html>
          LBHTML

          # Generate index page (list of runs)
          cat > site/index.html <<'INDEXHTML'
          <!DOCTYPE html>
          <html><head>
          <meta charset="utf-8">
          <title>House Puzzle E2E Screenshots</title>
          <style>
            body { font-family: -apple-system, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
            h1 { color: #2060b0; }
            .run { padding: 12px 16px; border: 1px solid #e0e0e0; border-radius: 8px; margin-bottom: 8px; display: flex; align-items: center; gap: 16px; }
            .run:hover { background: #f0f4ff; }
            .run a { color: #2060b0; text-decoration: none; font-weight: 600; }
            .run .date { color: #888; font-size: 13px; }
          </style>
          </head><body>
          <h1>House Puzzle — E2E Screenshots</h1>
          <div id="runs"></div>
          <script>
            fetch('runs.json').then(r=>r.json()).then(runs => {
              const el = document.getElementById('runs');
              runs.forEach(r => {
                el.innerHTML += '<div class="run"><a href="runs/'+r.id+'/">Run #'+r.id+'</a><span class="date">'+r.date+' &middot; '+r.sha+'</span></div>';
              });
            });
          </script>
          </body></html>
          INDEXHTML

      - name: Deploy to GitHub Pages
        run: |
          RUN=${{ github.run_id }}
          REPO=${{ github.repository }}
          DATE=$(date -u +%Y-%m-%d\ %H:%M)
          SHA=${{ github.sha }}
          SHORT_SHA=${SHA:0:7}

          # Clone gh-pages branch (or create it)
          git clone --branch gh-pages --single-branch "https://x-access-token:${{ github.token }}@github.com/${REPO}.git" gh-pages 2>/dev/null || {
            mkdir gh-pages && cd gh-pages && git init && git checkout -b gh-pages
            cd ..
          }

          # Copy new run
          cp -r site/runs/${RUN} gh-pages/runs/ 2>/dev/null || {
            mkdir -p gh-pages/runs
            cp -r site/runs/${RUN} gh-pages/runs/
          }
          cp site/index.html gh-pages/index.html

          # Update runs.json (prepend new run, keep last 20)
          cd gh-pages
          if [ -f runs.json ]; then
            python3 -c "
          import json
          runs = json.load(open('runs.json'))
          runs.insert(0, {'id': '${RUN}', 'date': '${DATE}', 'sha': '${SHORT_SHA}'})
          runs = runs[:20]
          json.dump(runs, open('runs.json','w'), indent=2)
          "
          else
            echo '[{"id":"'${RUN}'","date":"'${DATE}'","sha":"'${SHORT_SHA}'"}]' > runs.json
          fi

          # Remove old runs (keep last 20 directories)
          ls -1d runs/*/  2>/dev/null | head -n -20 | xargs rm -rf 2>/dev/null || true

          git config user.name "k5qkop-bot"
          git config user.email "noreply@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "E2E screenshots: run #${RUN} (${SHORT_SHA})"
          git push "https://x-access-token:${{ github.token }}@github.com/${REPO}.git" gh-pages

      - name: Add screenshots link to job summary
        run: |
          RUN=${{ github.run_id }}
          REPO=${{ github.repository }}
          OWNER=$(echo $REPO | cut -d/ -f1)
          REPO_NAME=$(echo $REPO | cut -d/ -f2)
          URL="https://${OWNER}.github.io/${REPO_NAME}/runs/${RUN}/"
          echo "## E2E Screenshots" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**[View screenshots for all platforms](${URL})**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[All runs](https://${OWNER}.github.io/${REPO_NAME}/)" >> $GITHUB_STEP_SUMMARY

      - name: Post PR comment with link
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}
          RUN=${{ github.run_id }}
          OWNER=$(echo $REPO | cut -d/ -f1)
          REPO_NAME=$(echo $REPO | cut -d/ -f2)
          URL="https://${OWNER}.github.io/${REPO_NAME}/runs/${RUN}/"

          BODY="## E2E Screenshots — [View all platforms](${URL})\n\nRun [#${RUN}](https://github.com/${REPO}/actions/runs/${RUN}) · [\`${GITHUB_SHA:0:7}\`](https://github.com/${REPO}/commit/${GITHUB_SHA})"

          # Delete previous bot comments
          gh api "repos/${REPO}/issues/${PR}/comments" --jq '.[] | select(.body | startswith("## E2E Screenshots")) | .id' | while read id; do
            gh api -X DELETE "repos/${REPO}/issues/comments/${id}" 2>/dev/null
          done

          gh api "repos/${REPO}/issues/${PR}/comments" -f body="$(echo -e "$BODY")"
