name: E2E Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  MACOSX_DEPLOYMENT_TARGET: "10.15"

jobs:
  e2e:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            artifact-suffix: linux
            app_binary: target/debug/hp-tauri
            test_binary: target/debug/hp-e2e-test
            cargo_build_args:
          - platform: macos-latest
            artifact-suffix: macos-aarch64
            app_binary: target/debug/hp-tauri
            test_binary: target/debug/hp-e2e-test
            cargo_build_args:
          - platform: macos-latest
            artifact-suffix: macos-x86_64
            app_binary: target/debug/hp-tauri
            test_binary: target/debug/hp-e2e-test
            cargo_build_args:
          - platform: windows-latest
            artifact-suffix: windows
            app_binary: target/release/hp-tauri.exe
            test_binary: target/release/hp-e2e-test.exe
            cargo_build_args: --release

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2

      - name: Cache Elm packages
        uses: actions/cache@v4
        with:
          path: ~/.elm
          key: ${{ runner.os }}-elm-${{ hashFiles('elm/elm.json') }}
          restore-keys: |
            ${{ runner.os }}-elm-

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libclang-dev libfontconfig1-dev libfreetype6-dev \
            pkg-config patchelf xvfb scrot \
            python3-gi gir1.2-atspi-2.0 at-spi2-core

      - name: Install LLVM (Windows)
        if: matrix.platform == 'windows-latest'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Set macOS deployment target flags
        if: matrix.platform == 'macos-latest'
        run: |
          echo "CFLAGS=-mmacosx-version-min=10.15" >> $GITHUB_ENV
          echo "CXXFLAGS=-mmacosx-version-min=10.15" >> $GITHUB_ENV

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Elm frontend
        working-directory: elm
        run: |
          npm install -g elm
          elm make src/Main.elm --output ../crates/hp-tauri/dist/elm.js

      - name: Configure SSH for private git deps
        shell: bash
        run: |
          mkdir -p "$HOME/.ssh"
          echo "${{ secrets.DEPLOY_KEY_TAURI_UI_TEST }}" > "$HOME/.ssh/tauri_ui_test"
          chmod 600 "$HOME/.ssh/tauri_ui_test"
          ssh-keyscan github.com >> "$HOME/.ssh/known_hosts" 2>/dev/null
          echo "GIT_SSH_COMMAND=ssh -i $HOME/.ssh/tauri_ui_test -o StrictHostKeyChecking=no" >> $GITHUB_ENV

      - name: Build app + test runner
        run: |
          cargo build ${{ matrix.cargo_build_args }} --manifest-path crates/hp-tauri/Cargo.toml
          cargo build ${{ matrix.cargo_build_args }} --manifest-path tests/accessibility/Cargo.toml

      - name: Download test fixture
        run: gh release download test-fixtures-v1 -p "_NY2.ai" -D in/
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run E2E tests (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          chmod +x ${{ matrix.app_binary }} ${{ matrix.test_binary }}
          xvfb-run --auto-servernum --server-args="-screen 0 1280x800x24" \
            ${{ matrix.test_binary }} \
              --binary ${{ matrix.app_binary }} \
              --fixture-dir in \
              --screenshots screenshots

      - name: Run E2E tests (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          chmod +x ${{ matrix.app_binary }} ${{ matrix.test_binary }}
          ${{ matrix.test_binary }} \
            --binary ${{ matrix.app_binary }} \
            --fixture-dir in \
            --screenshots screenshots

      - name: Run E2E tests (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          ${{ matrix.test_binary }} `
            --binary ${{ matrix.app_binary }} `
            --fixture-dir in `
            --screenshots screenshots

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots-${{ matrix.artifact-suffix }}
          path: screenshots/
          if-no-files-found: warn

  # Post screenshot summary as a PR comment
  post-screenshots:
    needs: e2e
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: screenshots
          pattern: e2e-screenshots-*
          merge-multiple: false

      - name: Post summary to PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}
          RUN=${{ github.run_id }}
          BODY="## E2E Screenshots — [Run #${RUN}](https://github.com/${REPO}/actions/runs/${RUN})\n\n"
          BODY+="| Platform | initial | house-loaded | puzzle-generated |\n"
          BODY+="|----------|---------|-------------|------------------|\n"

          for platform_dir in screenshots/e2e-screenshots-*/; do
            [ -d "$platform_dir" ] || continue
            platform=$(basename "$platform_dir" | sed 's/e2e-screenshots-//')
            row="| ${platform} |"
            for name in initial-state house-loaded puzzle-generated; do
              f="${platform_dir}${name}.png"
              if [ -s "$f" ]; then
                size=$(wc -c < "$f" | tr -d ' ')
                row+=" ${size}B |"
              else
                row+=" - |"
              fi
            done
            BODY+="${row}\n"
          done

          BODY+="\nDownload screenshots from [Artifacts](https://github.com/${REPO}/actions/runs/${RUN}#artifacts)."

          # Delete previous bot comments on this PR
          gh api "repos/${REPO}/issues/${PR}/comments" --jq '.[] | select(.body | startswith("## E2E Screenshots")) | .id' | while read id; do
            gh api -X DELETE "repos/${REPO}/issues/comments/${id}" 2>/dev/null
          done

          gh api "repos/${REPO}/issues/${PR}/comments" -f body="$(echo -e "$BODY")"
