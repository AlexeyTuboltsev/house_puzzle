[package]
name = "hp-tauri"
version = "0.1.0"
edition = "2021"

[build-dependencies]
tauri-build = { version = "2", features = [] }

# ── Debug / test-only dependencies ──────────────────────────────────────────
# tauri-plugin-webdriver embeds a W3C WebDriver server (port 4445) in the app,
# enabling E2E tests on all platforms (including macOS where tauri-driver is
# not supported). Never included in release builds.
[target.'cfg(debug_assertions)'.dependencies]
tauri-plugin-webdriver = "0.2"

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
tauri-plugin-updater = "2"
hp-core = { path = "../hp-core" }
parking_lot = "0.12"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
base64 = "0.22"
uuid = { version = "1", features = ["v4"] }
image = "0.24"
tokio = { version = "1", features = ["full"] }
