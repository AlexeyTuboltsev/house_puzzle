[package]
name = "hp-tauri"
version = "0.1.0"
edition = "2021"

[build-dependencies]
tauri-build = { version = "2", features = [] }

# ── Optional webdriver feature ───────────────────────────────────────────────
# Embeds a W3C WebDriver server (port 4445) for E2E tests.
# Enabled automatically in debug builds via cfg(debug_assertions).
# Can also be enabled explicitly via --features webdriver (e.g., Windows CI
# release builds that need the server but must avoid debug CRT linkage issues).
[features]
webdriver = ["dep:tauri-plugin-webdriver"]

[dependencies]
tauri-plugin-webdriver = { version = "0.2", optional = true }
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
tauri-plugin-updater = "2"
hp-core = { path = "../hp-core" }
parking_lot = "0.12"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
base64 = "0.22"
uuid = { version = "1", features = ["v4"] }
image = "0.24"
tokio = { version = "1", features = ["full"] }
