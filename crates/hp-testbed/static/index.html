<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>HP Bezier Merge Testbed</title>
<style>
  html, body { margin: 0; height: 100%; font-family: system-ui, sans-serif; background: #111; color: #eee; }
  body { display: grid; grid-template-rows: auto 1fr; height: 100vh; overflow: hidden; }
  #toolbar { display: flex; gap: 12px; align-items: center; padding: 8px 12px; background: #1b1b1b; border-bottom: 1px solid #333; }
  #toolbar label { font-size: 13px; }
  #toolbar select, #toolbar button {
    background: #222; color: #eee; border: 1px solid #444; padding: 4px 8px; font-size: 13px;
  }
  #toolbar button:hover { background: #2a2a2a; cursor: pointer; }
  #toolbar #status { margin-left: auto; font-size: 12px; color: #888; }

  #main { display: grid; grid-template-columns: 1fr 280px; min-height: 0; }

  #viewport {
    position: relative;
    overflow: hidden;
    background: #0a0a0a;
    cursor: grab;
  }
  #viewport.panning { cursor: grabbing; }
  #viewport.loading svg { opacity: 0.35; }
  #loadingOverlay {
    position: absolute; inset: 0;
    display: none; align-items: center; justify-content: center;
    pointer-events: none;
    color: #ffe066; font-family: system-ui, sans-serif;
    font-size: 14px; letter-spacing: 0.5px;
    background: rgba(0, 0, 0, 0.25);
  }
  #viewport.loading #loadingOverlay { display: flex; }
  #loadingOverlay .bubble {
    background: rgba(10, 10, 10, 0.85);
    border: 1px solid #333; padding: 10px 14px; border-radius: 6px;
  }
  #loadingOverlay .spinner {
    display: inline-block;
    width: 12px; height: 12px; margin-right: 8px;
    border: 2px solid #ffe066; border-top-color: transparent; border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #viewport svg {
    width: 100%;
    height: 100%;
    display: block;
  }
  /* Piece outlines are purely visual; bricks underneath are the click targets. */
  .piece-outline {
    fill: none; stroke: #4ea1ff; stroke-width: 2;
    stroke-linejoin: round; vector-effect: non-scaling-stroke;
    pointer-events: none;
  }
  .piece-outline.selected { stroke: #ffe066; stroke-width: 3; }

  /* Bricks cover the entire house, so any click lands on one. Fill is
     transparent so bricks receive clicks on the interior too. */
  .brick-outline {
    fill: transparent; stroke: #666; stroke-width: 1;
    stroke-dasharray: 2 3; vector-effect: non-scaling-stroke;
    cursor: pointer; pointer-events: all;
  }
  .brick-outline.hidden { stroke: transparent; stroke-dasharray: none; }
  .brick-outline.selected {
    stroke: #ffb700; stroke-width: 2; stroke-dasharray: none;
  }

  /* Vertex labels for the selected brick. */
  #vertexLayer text {
    fill: #ffb700; font-family: monospace; font-weight: bold;
    pointer-events: none; user-select: none;
    dominant-baseline: middle;
  }

  #info {
    background: #161616; border-left: 1px solid #333;
    overflow-y: auto; padding: 10px 12px; font-size: 12px; min-width: 0;
  }
  #info h3 { margin: 0 0 6px; font-size: 13px; color: #ffe066; }
  #info .kv { color: #aaa; }
  #info .brick {
    padding: 2px 4px; border-bottom: 1px dashed #2a2a2a; cursor: pointer;
  }
  #info .brick:hover { background: #1f1f1f; }
  #info .brick.selected { background: #2a2411; border-bottom-color: #4a3a10; }
  #info .brick .bid { color: #4ea1ff; font-family: monospace; }
  #info .brick.selected .bid { color: #ffb700; }
  #info .brick .bname { color: #ddd; margin-left: 6px; }
  #info .empty { color: #666; font-style: italic; }
  #zoom-hint { position: absolute; bottom: 8px; right: 8px; color: #555; font-size: 11px; user-select: none; }

  /* Piece-raster popup */
  #pieceModal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.78);
    display: none; align-items: center; justify-content: center;
    z-index: 10;
  }
  #pieceModal.visible { display: flex; }
  #pieceModalInner {
    background: #161616; border: 1px solid #333; border-radius: 6px;
    padding: 12px; max-width: 92vw; max-height: 92vh;
    display: flex; flex-direction: column; gap: 8px;
  }
  #pieceModalHeader {
    display: flex; justify-content: space-between; align-items: center;
    color: #ffe066; font-size: 13px;
  }
  #pieceModalClose {
    background: #222; color: #eee; border: 1px solid #444;
    padding: 4px 10px; cursor: pointer; font-size: 13px;
  }
  #pieceModalClose:hover { background: #2a2a2a; }
  #pieceModalCanvas {
    background: #0d0d0d url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16'><rect width='8' height='8' fill='%23222'/><rect x='8' y='8' width='8' height='8' fill='%23222'/></svg>");
    overflow: hidden; cursor: grab; user-select: none;
    width: min(80vw, 800px); height: min(80vh, 800px);
    display: flex; align-items: center; justify-content: center;
    border: 1px solid #2a2a2a;
  }
  #pieceModalCanvas.grabbing { cursor: grabbing; }
  #pieceModalImg {
    image-rendering: pixelated;
    transform-origin: 0 0;
    transform: translate(0, 0) scale(1);
    pointer-events: none;
  }
</style>
</head>
<body>
  <div id="toolbar">
    <label>File:
      <select id="fileSelect"></select>
    </label>
    <label>Piece:
      <select id="pieceSelect"><option value="">(all)</option></select>
    </label>
    <label><input type="checkbox" id="showBricks" checked> show brick outlines</label>
    <label><input type="checkbox" id="showRaster"> show raster</label>
    <span style="margin-left:12px; border-left:1px solid #333; padding-left:12px;">
      Pieces:
      <button id="targetDown" title="fewer">−</button>
      <input id="targetInput" type="number" value="120" min="2" max="500" step="1"
             style="width:64px; background:#222; color:#eee; border:1px solid #444; padding:4px;">
      <button id="targetUp" title="more">+</button>
    </span>
    <span style="margin-left:12px; border-left:1px solid #333; padding-left:12px;">
      Seed:
      <button id="seedBack" title="← prev seed">◀</button>
      <input id="seedInput" type="number" value="42" min="0" max="99" step="1"
             style="width:54px; background:#222; color:#eee; border:1px solid #444; padding:4px;">
      <button id="seedFwd" title="next seed →">▶</button>
    </span>
    <button id="fit">Fit</button>
    <button id="reload">Reload</button>
    <span id="status">loading…</span>
  </div>

  <div id="main">
    <div id="viewport">
      <svg id="svg" xmlns="http://www.w3.org/2000/svg"></svg>
      <div id="loadingOverlay"><div class="bubble"><span class="spinner"></span><span id="loadingText">loading…</span></div></div>
      <div id="zoom-hint">wheel: zoom &nbsp;·&nbsp; drag: pan</div>
    </div>
    <aside id="info">
      <div class="empty">Click a piece outline for details.</div>
    </aside>
  </div>

  <div id="pieceModal">
    <div id="pieceModalInner">
      <div id="pieceModalHeader">
        <span id="pieceModalTitle">piece</span>
        <span id="pieceModalHint" style="color:#888;">wheel: zoom · drag: pan</span>
        <button id="pieceModalClose">close</button>
      </div>
      <div id="pieceModalCanvas">
        <img id="pieceModalImg" alt="piece raster">
      </div>
    </div>
  </div>

<script>
(async () => {
  const $ = (sel) => document.querySelector(sel);
  const sel = $('#pieceSelect');
  const showBricks = $('#showBricks');
  const showRaster = $('#showRaster');
  const status = $('#status');
  const viewport = $('#viewport');
  const svg = $('#svg');
  const info = $('#info');
  const svgNS = 'http://www.w3.org/2000/svg';

  let state = {
    canvas: { w: 0, h: 0 },
    pieces: [],                // full pieces array
    bricks: [],                // brick preview array (may be empty)
    brickToPiece: new Map(),   // brick_id → piece_id
    selectedPieceId: null,
    selectedBrickId: null,
    viewBox: { x: 0, y: 0, w: 1, h: 1 },
  };

  // Bricks are always requested — they're the click targets.
  async function fetchPieces(pieceId, seed, file, target, signal) {
    const params = new URLSearchParams();
    if (pieceId) params.set('piece', pieceId);
    params.set('with_bricks', 'true');
    if (seed !== undefined && seed !== null) params.set('seed', String(seed));
    if (target !== undefined && target !== null) params.set('target', String(target));
    if (file) params.set('file', file);
    const r = await fetch('/api/pieces?' + params.toString(), { signal });
    if (!r.ok) throw new Error('api ' + r.status + ' ' + (await r.text()));
    return r.json();
  }

  async function fetchFiles() {
    const r = await fetch('/api/files');
    if (!r.ok) throw new Error('files api ' + r.status);
    return r.json();
  }

  function setViewBox(vb) {
    state.viewBox = vb;
    svg.setAttribute('viewBox', `${vb.x} ${vb.y} ${vb.w} ${vb.h}`);
    // Keep vertex markers a consistent on-screen size across zoom levels.
    if (state.selectedBrickId) renderVertices();
  }

  // Compute bbox over visible pieces+bricks.
  function overallBbox(data) {
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const p of data.pieces) {
      if (p.bbox) {
        minX = Math.min(minX, p.bbox[0]);
        minY = Math.min(minY, p.bbox[1]);
        maxX = Math.max(maxX, p.bbox[2]);
        maxY = Math.max(maxY, p.bbox[3]);
      }
    }
    if (!isFinite(minX)) return { x: 0, y: 0, w: data.canvas_width, h: data.canvas_height };
    // add 5% padding
    const pad = Math.max((maxX - minX) * 0.05, (maxY - minY) * 0.05, 4);
    return { x: minX - pad, y: minY - pad, w: (maxX - minX) + 2 * pad, h: (maxY - minY) + 2 * pad };
  }

  function fitView() {
    // Fit the content bbox, then center it in the viewport preserving aspect.
    const content = overallBbox({
      pieces: state.pieces,
      canvas_width: state.canvas.w,
      canvas_height: state.canvas.h,
    });
    // Expand to match viewport aspect so we don't distort.
    const vw = viewport.clientWidth || 1;
    const vh = viewport.clientHeight || 1;
    const vRatio = vw / vh;
    const cRatio = content.w / content.h;
    let vb;
    if (cRatio > vRatio) {
      // content wider than viewport → add vertical padding
      const needH = content.w / vRatio;
      vb = { x: content.x, y: content.y - (needH - content.h) / 2, w: content.w, h: needH };
    } else {
      const needW = content.h * vRatio;
      vb = { x: content.x - (needW - content.w) / 2, y: content.y, w: needW, h: content.h };
    }
    setViewBox(vb);
  }

  function render(data) {
    state.canvas = { w: data.canvas_width, h: data.canvas_height };
    state.pieces = data.pieces;
    state.bricks = data.bricks || [];
    state.brickToPiece = new Map();
    for (const p of state.pieces) {
      for (const b of p.bricks) state.brickToPiece.set(b.id, p.id);
    }

    // Build the SVG contents.
    svg.innerHTML = '';

    // Raster underlay (the artist's house composite). Hidden by default;
    // toggled by the "show raster" checkbox. Cache-busted by file id so
    // switching files always fetches fresh bytes.
    const rasterImg = document.createElementNS(svgNS, 'image');
    rasterImg.setAttribute('id', 'rasterLayer');
    rasterImg.setAttribute('x', '0');
    rasterImg.setAttribute('y', '0');
    rasterImg.setAttribute('width', String(state.canvas.w));
    rasterImg.setAttribute('height', String(state.canvas.h));
    rasterImg.setAttribute('preserveAspectRatio', 'none');
    rasterImg.setAttribute('pointer-events', 'none');
    if (!showRaster.checked) rasterImg.setAttribute('visibility', 'hidden');
    rasterImg.setAttribute(
      'href',
      `/api/composite?file=${encodeURIComponent(data.file || '')}`,
    );
    svg.appendChild(rasterImg);

    // Bricks first, as transparent-fill click targets covering the whole house.
    const bricksGroup = document.createElementNS(svgNS, 'g');
    bricksGroup.setAttribute('id', 'brickLayer');
    const brickVisibility = showBricks.checked ? '' : ' hidden';
    for (const brick of state.bricks) {
      for (const d of brick.svg) {
        const p = document.createElementNS(svgNS, 'path');
        p.setAttribute('d', d);
        p.setAttribute('class', 'brick-outline' + brickVisibility);
        p.setAttribute('data-brick', brick.id);
        p.addEventListener('click', (e) => {
          e.stopPropagation();
          selectBrick(brick.id);
          if (window.__openBrickModal) window.__openBrickModal(brick.id);
        });
        bricksGroup.appendChild(p);
      }
    }
    svg.appendChild(bricksGroup);

    // Piece outlines on top, but pointer-events:none so clicks fall through
    // to the brick underneath.
    const pieceGroup = document.createElementNS(svgNS, 'g');
    pieceGroup.setAttribute('id', 'pieceLayer');
    for (const piece of state.pieces) {
      for (const d of piece.svg) {
        const p = document.createElementNS(svgNS, 'path');
        p.setAttribute('d', d);
        p.setAttribute('class', 'piece-outline');
        p.setAttribute('data-piece', piece.id);
        pieceGroup.appendChild(p);
      }
    }
    svg.appendChild(pieceGroup);

    // Vertex overlay (only filled when a brick is selected).
    const vertexLayer = document.createElementNS(svgNS, 'g');
    vertexLayer.setAttribute('id', 'vertexLayer');
    svg.appendChild(vertexLayer);

    fitView();

    // Status
    const total = state.pieces.length;
    const pathCount = state.pieces.reduce((s, p) => s + p.svg.length, 0);
    const multi = state.pieces.filter(p => p.svg.length > 1).length;
    const empty = state.pieces.filter(p => p.svg.length === 0).length;
    const seed = (data.seed !== undefined) ? data.seed : '?';
    const target = (data.target !== undefined) ? data.target : '?';
    status.textContent = `${data.file || '—'} · target=${target} · seed=${seed} · ${total} pieces · ${pathCount} paths (multi: ${multi}, empty: ${empty})`;

    applySelection();
  }

  function renderInfo() {
    const id = state.selectedPieceId;
    if (!id) {
      info.innerHTML = '<div class="empty">Click a piece outline for details.</div>';
      return;
    }
    const piece = state.pieces.find(p => p.id === id);
    if (!piece) {
      info.innerHTML = `<div class="empty">Piece ${id} not in the current view.</div>`;
      return;
    }
    const bboxStr = piece.bbox
      ? `${piece.bbox.map(v => v.toFixed(1)).join(', ')}`
      : '—';
    const rows = piece.bricks.map(b => {
      const cls = b.id === state.selectedBrickId ? 'brick selected' : 'brick';
      return `<div class="${cls}" data-brick="${b.id}">` +
             `<span class="bid">${b.id}</span>` +
             `<span class="bname">${b.name || '(no name)'}</span></div>`;
    }).join('');

    let vertexBlock = '';
    if (state.selectedBrickId) {
      const brick = state.bricks.find(b => b.id === state.selectedBrickId);
      if (brick) {
        const multi = brick.vertices.length > 1;
        let html = `<h3 style="margin-top:12px">Brick ${brick.id} vertices</h3>`;
        for (let pi = 0; pi < brick.vertices.length; pi++) {
          if (multi) html += `<div class="kv">sub-path ${pi}</div>`;
          for (let vi = 0; vi < brick.vertices[pi].length; vi++) {
            const [x, y] = brick.vertices[pi][vi];
            const label = multi ? `v${pi}.${vi}` : `v${vi}`;
            html += `<div style="font-family:monospace;font-size:11px;">` +
                    `<span style="color:#ffb700">${label}</span> ` +
                    `(${x.toFixed(2)}, ${y.toFixed(2)})</div>`;
          }
        }
        vertexBlock = html;
      }
    }

    info.innerHTML = `
      <h3>Piece ${piece.id}</h3>
      <div class="kv">bricks: ${piece.bricks.length}</div>
      <div class="kv">paths: ${piece.svg.length}</div>
      <div class="kv">bbox: ${bboxStr}</div>
      <div style="height:6px"></div>
      <div>${rows || '<div class="empty">(no bricks)</div>'}</div>
      ${vertexBlock}
    `;
    // Let the user click rows to select the corresponding brick in the SVG.
    for (const row of info.querySelectorAll('.brick')) {
      row.addEventListener('click', () => selectBrick(row.getAttribute('data-brick')));
    }
  }

  function applySelection() {
    for (const el of svg.querySelectorAll('.piece-outline')) {
      el.classList.toggle('selected', el.getAttribute('data-piece') === state.selectedPieceId);
    }
    for (const el of svg.querySelectorAll('.brick-outline')) {
      el.classList.toggle('selected', el.getAttribute('data-brick') === state.selectedBrickId);
    }
    renderVertices();
    renderInfo();
  }

  /**
   * Draw labeled dots at every endpoint of the currently selected brick.
   * Sized in viewBox units so they stay roughly the same on-screen size.
   */
  function renderVertices() {
    const layer = svg.querySelector('#vertexLayer');
    if (!layer) return;
    layer.innerHTML = '';
    const id = state.selectedBrickId;
    if (!id) return;
    const brick = state.bricks.find(b => b.id === id);
    if (!brick) return;

    const vb = state.viewBox;
    const unit = Math.min(vb.w, vb.h);  // viewBox-unit ≈ screen-px when fit
    const fontPx = Math.max(unit * 0.012, 0.01);
    const offset = fontPx * 0.4;        // small gap right of the vertex point
    const multi = brick.vertices.length > 1;

    for (let pi = 0; pi < brick.vertices.length; pi++) {
      const verts = brick.vertices[pi];
      for (let vi = 0; vi < verts.length; vi++) {
        const [x, y] = verts[vi];
        const label = multi ? `v${pi}.${vi}` : `v${vi}`;
        const t = document.createElementNS(svgNS, 'text');
        t.setAttribute('x', x + offset);
        t.setAttribute('y', y);
        t.setAttribute('font-size', fontPx);
        t.textContent = label;
        layer.appendChild(t);
      }
    }
  }

  function selectPiece(id) {
    state.selectedPieceId = id;
    // Don't keep a stale brick selection when jumping to a different piece.
    if (id && state.selectedBrickId && state.brickToPiece.get(state.selectedBrickId) !== id) {
      state.selectedBrickId = null;
    }
    applySelection();
  }

  function selectBrick(id) {
    state.selectedBrickId = id;
    if (id) {
      const pieceId = state.brickToPiece.get(id);
      if (pieceId) state.selectedPieceId = pieceId;
    }
    applySelection();
  }

  // ─── Zoom & pan ───────────────────────────────────────────────────────
  viewport.addEventListener('wheel', (e) => {
    e.preventDefault();
    const vb = state.viewBox;
    const rect = viewport.getBoundingClientRect();
    // Pointer position in SVG coords.
    const px = vb.x + ((e.clientX - rect.left) / rect.width) * vb.w;
    const py = vb.y + ((e.clientY - rect.top) / rect.height) * vb.h;
    const factor = e.deltaY > 0 ? 1.2 : 1 / 1.2;
    const nw = vb.w * factor;
    const nh = vb.h * factor;
    setViewBox({
      x: px - (px - vb.x) * factor,
      y: py - (py - vb.y) * factor,
      w: nw,
      h: nh,
    });
  }, { passive: false });

  // Pan only engages after a small drag threshold, so a plain click on a
  // piece outline still fires as a click (not as a pan).
  const PAN_THRESHOLD_PX = 4;
  let pointer = null; // { pid, x0, y0, vb, dragging }
  viewport.addEventListener('pointerdown', (e) => {
    if (e.button !== 0) return;
    pointer = { pid: e.pointerId, x0: e.clientX, y0: e.clientY,
                vb: { ...state.viewBox }, dragging: false };
  });
  viewport.addEventListener('pointermove', (e) => {
    if (!pointer) return;
    const dx = e.clientX - pointer.x0;
    const dy = e.clientY - pointer.y0;
    if (!pointer.dragging) {
      if (Math.hypot(dx, dy) < PAN_THRESHOLD_PX) return;
      pointer.dragging = true;
      viewport.classList.add('panning');
      viewport.setPointerCapture(pointer.pid);
    }
    const rect = viewport.getBoundingClientRect();
    const sx = dx / rect.width * pointer.vb.w;
    const sy = dy / rect.height * pointer.vb.h;
    setViewBox({ x: pointer.vb.x - sx, y: pointer.vb.y - sy,
                 w: pointer.vb.w, h: pointer.vb.h });
  });
  const endPan = () => {
    if (pointer && pointer.dragging) {
      viewport.classList.remove('panning');
      try { viewport.releasePointerCapture(pointer.pid); } catch (_) {}
    }
    pointer = null;
  };
  viewport.addEventListener('pointerup', endPan);
  viewport.addEventListener('pointercancel', endPan);

  // Click on empty viewport (not on a path) → clear selection.
  // A click on a piece-outline path stops propagation above, so this only
  // fires on background clicks.
  svg.addEventListener('click', (e) => {
    const cl = e.target && e.target.classList;
    if (cl && cl.contains('brick-outline')) return;
    state.selectedPieceId = null;
    state.selectedBrickId = null;
    applySelection();
  });

  // ─── Actions ──────────────────────────────────────────────────────────
  const seedInput = $('#seedInput');
  const targetInput = $('#targetInput');
  function currentSeed() {
    const n = parseInt(seedInput.value, 10);
    return Number.isFinite(n) ? n : 42;
  }
  function currentTarget() {
    const n = parseInt(targetInput.value, 10);
    return Number.isFinite(n) && n >= 2 ? n : 120;
  }
  function setSeed(n) {
    const clamped = Math.max(0, Math.min(99, n));
    seedInput.value = String(clamped);
    refresh();
  }
  function setTarget(n) {
    const clamped = Math.max(2, Math.min(500, n));
    targetInput.value = String(clamped);
    refresh();
  }

  const fileSelect = $('#fileSelect');
  const loadingText = $('#loadingText');
  function currentFile() { return fileSelect.value || null; }

  // Cancel the previous in-flight request whenever we start a new one.
  // `reqToken` lets us ignore any response whose sender was superseded.
  let reqToken = 0;
  let reqController = null;

  async function refresh() {
    if (reqController) reqController.abort();
    reqController = new AbortController();
    const myToken = ++reqToken;
    const wantFile = currentFile();
    const wantSeed = currentSeed();
    const wantTarget = currentTarget();
    const wantPiece = sel.value || null;

    loadingText.textContent = `loading ${wantFile || '—'} target=${wantTarget} seed=${wantSeed}…`;
    viewport.classList.add('loading');

    try {
      const data = await fetchPieces(wantPiece, wantSeed, wantFile, wantTarget, reqController.signal);
      if (myToken !== reqToken) return;
      if (data.file !== wantFile) return;
      if (data.seed !== wantSeed) return;
      if (data.target !== wantTarget) return;
      await populatePieceSelector(data);
      render(data);
    } catch (e) {
      if (e.name === 'AbortError') return;
      if (myToken !== reqToken) return;
      status.textContent = 'error: ' + e.message;
      console.error(e);
    } finally {
      if (myToken === reqToken) viewport.classList.remove('loading');
    }
  }

  // Toggle brick visibility without re-fetching.
  function applyBrickVisibility() {
    for (const el of svg.querySelectorAll('.brick-outline')) {
      el.classList.toggle('hidden', !showBricks.checked);
    }
  }

  function applyRasterVisibility() {
    const layer = svg.querySelector('#rasterLayer');
    if (!layer) return;
    if (showRaster.checked) layer.removeAttribute('visibility');
    else layer.setAttribute('visibility', 'hidden');
  }

  // Piece-raster popup. Clicking a piece (or any of its bricks) opens a
  // modal showing /api/piece-png clipped to the piece outline. Wheel
  // zoom + drag pan inside the modal canvas.
  function setupPieceModal() {
    const modal = $('#pieceModal');
    const img = $('#pieceModalImg');
    const canvas = $('#pieceModalCanvas');
    const title = $('#pieceModalTitle');
    let scale = 1, tx = 0, ty = 0;
    let dragging = false, sx = 0, sy = 0, dx = 0, dy = 0;

    const apply = () => {
      img.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
    };
    const reset = () => { scale = 1; tx = 0; ty = 0; apply(); };

    const openPiece = (pieceId) => {
      const file = currentFile() || '';
      const seed = currentSeed();
      const target = currentTarget();
      const url = `/api/piece-png?file=${encodeURIComponent(file)}&piece=${encodeURIComponent(pieceId)}&seed=${seed}&target=${target}&v=${Date.now()}`;
      title.textContent = `${file} · ${pieceId}`;
      img.src = url;
      reset();
      modal.classList.add('visible');
    };

    const openBrick = (brickId) => {
      const file = currentFile() || '';
      const url = `/api/brick-png?file=${encodeURIComponent(file)}&brick=${encodeURIComponent(brickId)}&v=${Date.now()}`;
      const pid = state.brickToPiece && state.brickToPiece.get(brickId);
      title.textContent = `${file} · ${brickId}` + (pid ? ` (in ${pid})` : '');
      img.src = url;
      reset();
      modal.classList.add('visible');
    };
    const close = () => {
      modal.classList.remove('visible');
      img.src = '';
    };

    $('#pieceModalClose').addEventListener('click', close);
    modal.addEventListener('click', (e) => { if (e.target === modal) close(); });
    window.addEventListener('keydown', (e) => {
      if (modal.classList.contains('visible') && e.key === 'Escape') close();
    });

    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const cx = e.clientX - rect.left;
      const cy = e.clientY - rect.top;
      const factor = e.deltaY < 0 ? 1.18 : 1 / 1.18;
      // Zoom around the cursor: keep cursor-relative point fixed.
      tx = cx - (cx - tx) * factor;
      ty = cy - (cy - ty) * factor;
      scale = Math.max(0.1, Math.min(40, scale * factor));
      apply();
    }, { passive: false });

    canvas.addEventListener('pointerdown', (e) => {
      dragging = true; sx = e.clientX; sy = e.clientY; dx = tx; dy = ty;
      canvas.classList.add('grabbing');
      canvas.setPointerCapture(e.pointerId);
    });
    canvas.addEventListener('pointermove', (e) => {
      if (!dragging) return;
      tx = dx + (e.clientX - sx);
      ty = dy + (e.clientY - sy);
      apply();
    });
    const endDrag = (e) => {
      if (!dragging) return;
      dragging = false;
      canvas.classList.remove('grabbing');
      try { canvas.releasePointerCapture(e.pointerId); } catch {}
    };
    canvas.addEventListener('pointerup', endDrag);
    canvas.addEventListener('pointercancel', endDrag);

    // Sized so the image initially fits its container; runs after load.
    img.addEventListener('load', () => {
      const cw = canvas.clientWidth, ch = canvas.clientHeight;
      const iw = img.naturalWidth, ih = img.naturalHeight;
      if (!iw || !ih) return;
      const fit = Math.min(cw / iw, ch / ih) * 0.95;
      scale = fit;
      tx = (cw - iw * fit) / 2;
      ty = (ch - ih * fit) / 2;
      apply();
    });

    // Expose for the brick click handler.
    window.__openPieceModal = openPiece;
    window.__openBrickModal = openBrick;
  }

  async function populatePieceSelector(data) {
    sel.innerHTML = '<option value="">(all)</option>';
    for (const p of data.pieces) {
      const opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = `${p.id} (${p.bricks.length} bricks, ${p.svg.length} paths)`;
      sel.appendChild(opt);
    }
  }

  // Populate the file dropdown. Files that already have a cached snapshot
  // are marked with ✓; generating one on first access takes ~90s.
  // Preserve whatever the user currently has selected across rebuilds — we
  // only let the server decide on first call (when nothing is selected yet).
  async function initFiles() {
    const prev = fileSelect.value;
    const list = await fetchFiles();
    fileSelect.innerHTML = '';
    for (const f of list.files) {
      const opt = document.createElement('option');
      opt.value = f.name;
      opt.textContent = (f.ready ? '✓ ' : '⋯ ') + f.name;
      fileSelect.appendChild(opt);
    }
    const exists = (name) => list.files.some(f => f.name === name);
    if (prev && exists(prev)) {
      fileSelect.value = prev; // keep user's selection
    } else if (list.current && exists(list.current)) {
      fileSelect.value = list.current;
    } else if (list.files.length) {
      fileSelect.value = list.files[0].name;
    }
  }

  try {
    await initFiles();
    await refresh();
    initFiles(); // refresh ready-flags after first load (cosmetic)
  } catch (e) {
    status.textContent = 'error: ' + e.message;
  }

  sel.addEventListener('change', refresh);
  showBricks.addEventListener('change', applyBrickVisibility);
  showRaster.addEventListener('change', applyRasterVisibility);
  $('#fit').addEventListener('click', fitView);
  $('#reload').addEventListener('click', refresh);
  setupPieceModal();
  fileSelect.addEventListener('change', async () => {
    // New file: clear selection state and piece dropdown. The piece
    // dropdown will be rebuilt by refresh() once the data returns.
    state.selectedPieceId = null;
    state.selectedBrickId = null;
    sel.value = '';
    await refresh();
    initFiles(); // refresh ready flags (don't await — cosmetic only)
  });
  window.addEventListener('resize', fitView);

  // Seed navigation: buttons + arrow keys.
  $('#seedBack').addEventListener('click', () => setSeed(currentSeed() - 1));
  $('#seedFwd').addEventListener('click', () => setSeed(currentSeed() + 1));
  // Cover both `change` (fired on blur) and Enter keypress explicitly.
  seedInput.addEventListener('change', refresh);
  seedInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') refresh(); });

  // Target (piece count) controls.
  $('#targetDown').addEventListener('click', () => setTarget(currentTarget() - 1));
  $('#targetUp').addEventListener('click', () => setTarget(currentTarget() + 1));
  targetInput.addEventListener('change', refresh);
  targetInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') refresh(); });
  window.addEventListener('keydown', (e) => {
    // Ignore when typing into any input/textarea.
    const tag = (e.target && e.target.tagName) || '';
    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
    if (e.key === 'ArrowLeft')  { e.preventDefault(); setSeed(currentSeed() - 1); }
    if (e.key === 'ArrowRight') { e.preventDefault(); setSeed(currentSeed() + 1); }
  });
})();
</script>
</body>
</html>
