services:
  editor:
    build: .
    ports:
      - "5050:5050"
    volumes:
      - .:/app
      - ./in:/app/in
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1

  elm-build:
    image: node:22-slim
    working_dir: /app/elm
    volumes:
      - .:/app
    # Installs elm once (cached in node_modules/.bin) then compiles
    command: >
      sh -c "npm install --save-dev elm@0.19.1-5 &&
             npx elm make src/Main.elm --output ../static/elm.js"
    profiles:
      - elm
