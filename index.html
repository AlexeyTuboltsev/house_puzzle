<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<title>House Puzzle E2E Screenshots</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
  h1 { color: #2060b0; }
  .run { padding: 12px 16px; border: 1px solid #e0e0e0; border-radius: 8px; margin-bottom: 8px; display: flex; align-items: center; gap: 16px; }
  .run:hover { background: #f0f4ff; }
  .run a { color: #2060b0; text-decoration: none; font-weight: 600; }
  .run .date { color: #888; font-size: 13px; }
</style>
</head><body>
<h1>House Puzzle — E2E Screenshots</h1>
<div id="runs"></div>
<script>
  fetch('runs.json').then(r=>r.json()).then(runs => {
    const el = document.getElementById('runs');
    runs.forEach(r => {
      el.innerHTML += '<div class="run"><a href="runs/'+r.id+'/">Run #'+r.id+'</a><span class="date">'+r.date+' &middot; '+r.sha+'</span></div>';
    });
  });
</script>
</body></html>
