<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Presets — House Puzzle Editor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 24px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .header {
            margin-bottom: 24px;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 600;
            color: #e0a050;
            margin-bottom: 4px;
        }
        .header .subtitle {
            font-size: 12px;
            color: #666;
            margin-bottom: 12px;
        }
        .header a {
            color: #e0a050;
            text-decoration: none;
            font-size: 13px;
        }
        .header a:hover { text-decoration: underline; }

        .preset-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .preset-item {
            background: #16213e;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .preset-info {
            flex: 1;
            min-width: 0;
        }
        .preset-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 2px;
        }
        .preset-name input {
            background: #2a2a4a;
            border: 1px solid #e0a050;
            border-radius: 3px;
            color: #e0e0e0;
            font-size: 14px;
            font-weight: 600;
            padding: 2px 6px;
            width: 200px;
        }
        .preset-name input:focus { outline: none; }
        .preset-summary {
            font-size: 11px;
            color: #888;
        }
        .preset-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        .preset-actions button {
            padding: 4px 12px;
            border: 1px solid #555;
            border-radius: 4px;
            background: #2a2a4a;
            color: #e0e0e0;
            cursor: pointer;
            font-size: 12px;
        }
        .preset-actions button:hover { background: #3a3a6a; }
        .preset-actions button.danger { color: #ff8080; }
        .preset-actions button.danger:hover { background: #4a2020; }
        .preset-actions button.save { color: #80ff80; }
        .preset-actions button.save:hover { background: #204a20; }

        .empty {
            text-align: center;
            color: #666;
            padding: 32px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Manage Presets</h1>
            <div class="subtitle">presets/</div>
            <a href="/">&larr; Back to Editor</a>
        </div>
        <div class="preset-list" id="presetList">
            <div class="empty">Loading...</div>
        </div>
    </div>

    <script>
        async function loadPresets() {
            const listEl = document.getElementById('presetList');
            try {
                const resp = await fetch('/api/presets');
                const data = await resp.json();
                if (!data.presets.length) {
                    listEl.innerHTML = '<div class="empty">No presets found.</div>';
                    return;
                }
                listEl.innerHTML = '';
                for (const name of data.presets) {
                    const detailResp = await fetch('/api/presets/' + encodeURIComponent(name));
                    const params = await detailResp.json();
                    const item = document.createElement('div');
                    item.className = 'preset-item';
                    const summary = Object.entries(params)
                        .map(([k, v]) => `${k}=${v}`)
                        .join('  ');
                    item.innerHTML = `
                        <div class="preset-info">
                            <div class="preset-name" data-name="${name}">${name}</div>
                            <div class="preset-summary">${summary}</div>
                        </div>
                        <div class="preset-actions">
                            <button onclick="startRename(this, '${name}')">Rename</button>
                            <button class="danger" onclick="deletePreset('${name}')">Delete</button>
                        </div>
                    `;
                    listEl.appendChild(item);
                }
            } catch (e) {
                listEl.innerHTML = '<div class="empty">Failed to load presets.</div>';
            }
        }

        function startRename(btn, oldName) {
            const nameEl = btn.closest('.preset-item').querySelector('.preset-name');
            const input = document.createElement('input');
            input.type = 'text';
            input.value = oldName;
            nameEl.textContent = '';
            nameEl.appendChild(input);
            input.focus();
            input.select();

            btn.textContent = 'Save';
            btn.className = btn.className.replace('danger', '').trim() + ' save';
            btn.onclick = () => doRename(btn, oldName, input.value.trim());

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') doRename(btn, oldName, input.value.trim());
                if (e.key === 'Escape') loadPresets();
            });
        }

        async function doRename(btn, oldName, newName) {
            if (!newName || newName === oldName) {
                loadPresets();
                return;
            }
            try {
                const resp = await fetch('/api/presets/' + encodeURIComponent(oldName), {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ new_name: newName }),
                });
                const data = await resp.json();
                if (data.error) {
                    alert(data.error);
                    return;
                }
                loadPresets();
            } catch (e) {
                alert('Failed to rename: ' + e.message);
            }
        }

        async function deletePreset(name) {
            if (!confirm('Delete preset "' + name + '"?')) return;
            try {
                await fetch('/api/presets/' + encodeURIComponent(name), { method: 'DELETE' });
                loadPresets();
            } catch (e) {
                alert('Failed to delete: ' + e.message);
            }
        }

        loadPresets();
    </script>
</body>
</html>
