<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>House Puzzle Editor (Elm)</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    height: 100vh;
    overflow: hidden;
}

.app { display: flex; flex-direction: column; height: 100vh; }

.header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px;
    background: #16213e;
    border-bottom: 1px solid #333;
    height: 48px;
    flex-shrink: 0;
}
.header h1 {
    font-size: 16px;
    font-weight: 600;
    color: #e0a050;
    margin-right: auto;
}
.header button, .sidebar button, .waves-panel button {
    padding: 6px 16px;
    border: 1px solid #555;
    border-radius: 4px;
    background: #2a2a4a;
    color: #e0e0e0;
    cursor: pointer;
    font-size: 13px;
}
.header button:hover, .sidebar button:hover, .waves-panel button:hover { background: #3a3a6a; }
.header button:disabled, .sidebar button:disabled, .waves-panel button:disabled { opacity: 0.4; cursor: not-allowed; }
.header button.primary, .sidebar button.primary, .waves-panel button.primary {
    background: #e0a050;
    color: #1a1a2e;
    border-color: #e0a050;
    font-weight: 600;
}
.header button.primary:hover { background: #f0b060; }
.header button.primary:disabled { opacity: 0.4; }

.main {
    display: flex;
    height: calc(100vh - 48px);
    overflow: hidden;
}

/* Column 1: Settings sidebar */
.sidebar {
    width: 260px;
    min-width: 260px;
    background: #16213e;
    border-right: 1px solid #333;
    padding: 12px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}
.sidebar h2 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #888;
    margin-bottom: 8px;
}
.sidebar h2:not(:first-child) { margin-top: 14px; }

.param-group { margin-bottom: 6px; }
.param-group label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    margin-bottom: 2px;
}
.param-group label .value {
    color: #e0a050;
    font-weight: 600;
}
.param-group input[type="range"] {
    width: 100%;
    accent-color: #e0a050;
}
.param-group input[type="number"] {
    width: 70px;
    background: #2a2a4a;
    border: 1px solid #555;
    color: #e0e0e0;
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 12px;
}

.checkbox-group {
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
}
.checkbox-group input[type="checkbox"] { accent-color: #e0a050; }

.btn-row {
    display: flex;
    gap: 6px;
    margin-top: 8px;
}
.btn-row button {
    flex: 1;
    padding: 6px;
    font-size: 12px;
}

.stats {
    background: #0f1629;
    border-radius: 6px;
    padding: 8px;
    font-size: 11px;
    line-height: 1.7;
}
.stats .row {
    display: flex;
    justify-content: space-between;
}
.stats .row .val {
    color: #e0a050;
    font-weight: 600;
}

.view-toggles {
    display: flex;
    gap: 4px;
    margin-bottom: 8px;
}
.view-toggles button {
    flex: 1;
    padding: 4px;
    font-size: 11px;
}
.view-toggles button.active {
    background: #e0a050;
    color: #1a1a2e;
    border-color: #e0a050;
}

.status { font-size: 11px; margin-top: 4px; display: inline-block; }
.status.loading { color: #fa0; }
.status.error   { color: #f64; }
.status.ok      { color: #4c4; }

/* Column 2: Canvas */
.canvas-area {
    flex: 1;
    overflow: auto;
    background: #000;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 16px;
}
.canvas-info {
    color: #555;
    font-size: 15px;
    align-self: center;
}
.house-svg {
    display: block;
    max-width: 100%;
}
.brick-path { cursor: pointer; }
.brick-path:hover { fill: rgba(64,170,255,0.2); stroke: #8df; }

/* Column 3: Waves panel */
.waves-panel-wrapper {
    display: flex;
    flex-shrink: 0;
}
.waves-resize-handle {
    width: 5px;
    cursor: col-resize;
    background: #333;
    flex-shrink: 0;
    transition: background 0.15s;
}
.waves-resize-handle:hover { background: #e0a050; }
.waves-panel {
    width: 600px;
    min-width: 180px;
    background: #16213e;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
.waves-header {
    padding: 8px 12px;
    border-bottom: 1px solid #333;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
}
.waves-header h2 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #888;
    margin: 0;
    flex: 1;
}
.waves-header .wave-count {
    color: #e0a050;
    font-size: 12px;
    font-weight: 600;
}
.waves-body {
    flex: 1;
    overflow-y: auto;
}
.wave-toolbar {
    padding: 6px 12px;
    border-bottom: 1px solid #333;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
}
.wave-toolbar button { padding: 4px 10px; font-size: 11px; }

.wave-row { border-bottom: 1px solid #222; padding: 4px 0; }
.wave-row-header {
    display: flex;
    align-items: center;
    padding: 2px 10px;
    gap: 6px;
    font-size: 12px;
    user-select: none;
}
.wave-row-header:hover { background: rgba(255,255,255,0.03); }
.wave-eye {
    cursor: pointer;
    font-size: 14px;
    color: #e0a050;
    opacity: 0.8;
    line-height: 1;
}
.wave-eye:hover { opacity: 1; }
.wave-eye.hidden { color: #555; opacity: 0.5; }
.wave-label {
    font-weight: 600;
    color: #e0a050;
    min-width: 60px;
}
.wave-label.unassigned-label { color: #888; }
.wave-piece-count { color: #888; font-size: 11px; flex: 1; }

.wave-pieces {
    display: flex;
    gap: 4px;
    padding: 4px 10px;
    overflow-x: auto;
    overflow-y: hidden;
    min-height: 56px;
    align-items: center;
}
.wave-pieces::-webkit-scrollbar { height: 4px; }
.wave-pieces::-webkit-scrollbar-track { background: #0f1629; border-radius: 2px; }
.wave-pieces::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }

.piece-thumb {
    flex-shrink: 0;
    cursor: pointer;
    border: 2px solid transparent;
    border-radius: 3px;
    padding: 2px;
    transition: border-color 0.15s;
}
.piece-thumb:hover { border-color: rgba(60,200,255,0.6); }
.piece-thumb-label { font-size: 9px; color: #aaa; text-align: center; margin-top: 1px; }

/* Not-built banner */
#not-built {
    display: none;
    padding: 24px;
    text-align: center;
    color: #f84;
    font-size: 14px;
    line-height: 1.7;
}
</style>
</head>
<body>

<div id="not-built">
  <b>elm.js not found.</b><br>
  Run: <code>docker compose --profile elm run --rm elm-build</code><br>
  then reload this page.
</div>

<div id="elm-root"></div>

<script>
window.addEventListener('error', function(e) {
  if (e.filename && e.filename.includes('elm.js')) {
    document.getElementById('not-built').style.display = 'block';
  }
}, true);
</script>
<script src="/static/elm.js" onerror="document.getElementById('not-built').style.display='block'"></script>
<script>
if (window.Elm && window.Elm.Main) {
  const app = window.Elm.Main.init({ node: document.getElementById('elm-root') });

  // ── Port: compositePieces ───────────────────────────────────────────────────────
  // Receives: [{id, x, y, w, h, bricks: [{id, x, y, w, h}, ...]}]
  // Sends back via gotPieceImages: [{id, dataUrl}]

  const _imgCache = {};

  function loadImg(src) {
    if (_imgCache[src]) return Promise.resolve(_imgCache[src]);
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => { _imgCache[src] = img; resolve(img); };
      img.onerror = reject;
      img.src = src;
    });
  }

  app.ports.compositePieces.subscribe(async function(pieces) {
    const results = [];
    for (const piece of pieces) {
      const canvas = document.createElement('canvas');
      canvas.width  = Math.round(piece.w);
      canvas.height = Math.round(piece.h);
      const ctx = canvas.getContext('2d');

      for (const brick of piece.bricks) {
        try {
          const img = await loadImg(`/api/brick/${brick.id}.png`);
          ctx.drawImage(img,
            Math.round(brick.x - piece.x),
            Math.round(brick.y - piece.y)
          );
        } catch (e) {
          console.warn('Failed to load brick', brick.id, e);
        }
      }

      results.push({ id: piece.id, dataUrl: canvas.toDataURL() });
    }
    app.ports.gotPieceImages.send(results);
  });
}
</script>
</body>
</html>
